<p-dialog
  header="{{ modalService.moadalMode() }}"
  [modal]="true"
  [(visible)]="modalService.visible"
  [style]="{ width: '25rem' }"
>
  <span class="p-text-secondary block mb-8">Update your information.</span>
  <form [formGroup]="noteForm" (ngSubmit)="onSubmit()">
    <div class="flex items-center gap-4 mb-4">
      <label for="username" class="font-semibold w-24">Title</label>
      <input
        formControlName="title"
        pInputText
        id="username"
        class="flex-auto"
        autocomplete="off"
      />
    </div>
    <div class="flex items-center gap-4 mb-8">
      <label for="email" class="font-semibold w-24">Content</label>
      <input formControlName="content" pInputText id="email" class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" (click)="modalService.closeModal()" severity="secondary" />
      <p-button [label]="modalService.moadalMode()" (click)="onSubmit()" />
    </div>
  </form>
</p-dialog>
