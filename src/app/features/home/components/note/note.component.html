<div
  class="relative w-64 h-64 p-6 bg-gradient-to-br from-yellow-100 to-yellow-300 shadow-lg transform -rotate-2 hover:rotate-0 transition-transform duration-300 ease-in-out"
>
  <div
    class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-4 bg-white/40 shadow-sm backdrop-blur-sm -rotate-3"
  ></div>

  <div class="flex flex-col h-full justify-between">
    <div>
      <h3 class="text-xl font-bold text-gray-800 border-b border-yellow-400/50 pb-2 mb-3 font-sans">
        {{note.title}}
      </h3>

      <p class="text-gray-700 font-medium leading-relaxed">{{note.content}}</p>
    </div>

    <div class="mt-4 text-xs text-gray-600 font-semibold text-right opacity-70">{{note.createdAt | date:"dd MMM yyyy hh:mm a"}}</div>
  </div>
</div>
